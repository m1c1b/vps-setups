services:
  nginx:
    image: jonasal/nginx-certbot:latest
    restart: unless-stopped
    environment:
      - CERTBOT_EMAIL=your@email.xyz
      - DHPARAM_SIZE=2048
      - ELLIPTIC_CURVE=secp256r1
      - RENEWAL_INTERVAL=8d
      - RSA_KEY_SIZE=2048
      - STAGING=0
      - USE_ECDSA=1
      - CERTBOT_AUTHENTICATOR=webroot
      - DEBUG=0
      - USE_LOCAL_CA=0
    ports:
      - "80:80"
      - "8443:8443"
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./nginx_secrets:/etc/letsencrypt
      - ./user_conf.d:/etc/nginx/user_conf.d
      - ./static:/etc/nginx/static:ro

  3xui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: 3xui_app
    hostname: host-placeholder
    volumes:
      - ./3x-ui-db/:/etc/x-ui/
      - ./nginx_secrets:/etc/letsencrypt:ro
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
    tty: true
    network_mode: host
    restart: unless-stopped
