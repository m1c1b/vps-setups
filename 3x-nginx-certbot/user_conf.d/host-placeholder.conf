server {
    listen 8443 ssl;
    server_name 'host-placeholder';

    ssl_certificate         /etc/letsencrypt/live/host-placeholder/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/host-placeholder/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/host-placeholder/chain.pem;

    root /etc/nginx/static;
    index index.html;

    location /sub/ {
        proxy_pass http://host.docker.internal:2096/sub/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /json/ {
        proxy_pass http://host.docker.internal:2096/json/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 80;
    server_name 'host-placeholder';

    location ~ /\.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
