<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; padding: 2rem; }
    .logo {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    .tagline { color: #64748b; font-size: 1.1rem; margin-bottom: 3rem; }
    .status {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: #1e1e2e;
      border: 1px solid #2d2d3f;
      border-radius: 2rem;
      padding: .6rem 1.4rem;
      font-size: .9rem;
      color: #94a3b8;
    }
    .dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    footer { position: fixed; bottom: 1.5rem; color: #334155; font-size: .8rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Cloud</div>
    <div class="tagline">Secure and Reliable Infrastructure</div>
    <div class="status"><span class="dot"></span> All systems operational</div>
  </div>
  <footer>&copy; 2026 Cloud. All rights reserved.</footer>
</body>
</html>
